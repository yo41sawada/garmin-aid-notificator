name: Build

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Secrets Check
        run: |
          TRACKED=$(git ls-files credentials/)
          if [ -n "$TRACKED" ]; then
            echo "Secrets check failed: credential files are tracked by git."
            echo "$TRACKED"
            exit 1
          fi

      - name: Set up Java (Temurin)
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: '26'

      - name: Add SDK to PATH
        run: echo "$GITHUB_WORKSPACE/ci/sdk" >> $GITHUB_PATH

      - name: Set up device definitions
        run: |
          mkdir -p "$HOME/.Garmin/ConnectIQ/Devices"
          cp -r ci/devices/fr165 "$HOME/.Garmin/ConnectIQ/Devices/"

      - name: Generate developer key
        run: |
          mkdir -p credentials
          openssl genrsa -out credentials/developer_key.pem 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in credentials/developer_key.pem \
            -out credentials/developer_key.der -nocrypt

      - name: Build
        run: |
          mkdir -p output
          monkeyc -f monkey.jungle -o output/aid-notificator.prg -d fr165 -y credentials/developer_key.der

      - name: Lint
        run: |
          OUTPUT=$(monkeyc -f monkey.jungle -o /tmp/lint.prg -d fr165 -y credentials/developer_key.der -w 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "^WARNING:"; then
            echo "Lint failed: warnings found."
            exit 1
          fi

      - name: Static Analysis
        run: |
          monkeyc -f monkey.jungle -o /tmp/analysis.prg -d fr165 -y credentials/developer_key.der -l 3
